<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>bant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    color: #e8e6e0;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #app {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .panel-left {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 24px);
    left: calc(env(safe-area-inset-left, 0px) + 20px);
    z-index: 4;
  }
  #counter {
    font-size: 44px;
    font-weight: 200;
    color: #e8e6e0;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .panel-right {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 24px);
    right: calc(env(safe-area-inset-right, 0px) + 20px);
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }
  button {
    background: transparent;
    border: 0.5px solid rgba(232,230,224,0.2);
    color: rgba(232,230,224,0.5);
    font-size: 10px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    transition: all 0.15s;
  }
  button:active { transform: scale(0.96); }
  button:hover { color: rgba(232,230,224,0.8); border-color: rgba(232,230,224,0.4); }
  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: none;
  }
  #bag-canvas {
    filter: drop-shadow(0 30px 40px rgba(0,0,0,0.7));
    max-width: 90vw;
    max-height: 80vh;
    width: 340px;
    height: 480px;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.3s;
  }
  #bag-canvas.swipe-out-left { transform: translateX(-110vw); opacity: 0.2; }
  #bag-canvas.swipe-out-right { transform: translateX(110vw); opacity: 0.2; }
  #bag-canvas.swipe-in-left { transform: translateX(110vw); opacity: 0.2; transition: none; }
  #bag-canvas.swipe-in-right { transform: translateX(-110vw); opacity: 0.2; transition: none; }
  .footer {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    pointer-events: none;
    z-index: 5;
  }
  .dots {
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(232,230,224,0.2);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active {
    background: rgba(232,230,224,0.85);
    transform: scale(1.2);
  }
  .dot:hover { background: rgba(232,230,224,0.5); }
  #hint {
    font-size: 11px;
    color: rgba(232,230,224,0.4);
    letter-spacing: 0.18em;
    text-align: center;
    padding: 0 16px;
  }
  @media (max-width: 400px) {
    #bag-canvas { width: 88vw; height: auto; aspect-ratio: 340/480; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="panel-left">
    <div id="counter">0</div>
  </div>

  <div class="panel-right">
    <button id="gyro-btn">gyro</button>
  </div>

  <div id="stage">
    <canvas id="bag-canvas" width="680" height="960"></canvas>
    <img id="bag-source" crossorigin="anonymous" alt="" style="display:none;">
  </div>

  <div class="footer">
    <div class="dots" id="dots"></div>
    <div id="hint">bant</div>
  </div>
</div>

      const x = BAG_LEFT + u * BAG_W;
      const y = BAG_TOP + v * BAG_H;
      restX[i] = x; restY[i] = y;
      posX[i] = x; posY[i] = y;
      uvU[i] = u; uvV[i] = v;
    }
  }

  const triangles = [];
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const tl = r * COLS + c;
      const tr = r * COLS + (c + 1);
      const bl = (r + 1) * COLS + c;
      const br = (r + 1) * COLS + (c + 1);
      triangles.push([tl, tr, br]);
      triangles.push([tl, br, bl]);
    }
  }

  let count = 0;
  const CRUMPLE_THRESHOLD = 150;
  let isCrumpled = false;
  let imgReady = false;
  let currentBagIdx = 0;

  function renderDots() {
    dotsEl.innerHTML = '';
    BAGS.forEach((bag, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === currentBagIdx ? ' active' : '');
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        if (i !== currentBagIdx) {
          const direction = i > currentBagIdx ? 'right' : 'left';
          switchBag(i, direction);
        }
      });
      dotsEl.appendChild(dot);
    });
  }

  function switchBag(newIdx, direction) {
    if (newIdx < 0 || newIdx >= BAGS.length) return;
    const outClass = direction === 'right' ? 'swipe-out-left' : 'swipe-out-right';
    const inClass = direction === 'right' ? 'swipe-in-right' : 'swipe-in-left';
    canvas.classList.add(outClass);
    setTimeout(() => {
      currentBagIdx = newIdx;
      const bag = BAGS[currentBagIdx];
      img.src = bag.src;
      renderDots();
      for (let i = 0; i < NV; i++) {
        posX[i] = restX[i];
        posY[i] = restY[i];
        velX[i] = 0; velY[i] = 0;
        permX[i] = 0; permY[i] = 0;
      }
      count = 0;
      isCrumpled = false;
      updateCounter();
      canvas.classList.remove(outClass);
      canvas.classList.add(inClass);
      canvas.offsetWidth;
      canvas.classList.remove(inClass);
      playSwipeSound();
    }, 280);
  }

  img.onload = () => { imgReady = true; render(); };
  img.src = BAGS[0].src;

  const SPRING_K = 0.15;
  const NEIGHBOR_K = 0.08;
  const DAMPING = 0.82;
  const PERM_DECAY = 0.998;
  const MAX_VEL = 40;

  function drawTriangle(i0, i1, i2) {
    const sx0 = uvU[i0] * img.naturalWidth, sy0 = uvV[i0] * img.naturalHeight;
    const sx1 = uvU[i1] * img.naturalWidth, sy1 = uvV[i1] * img.naturalHeight;
    const sx2 = uvU[i2] * img.naturalWidth, sy2 = uvV[i2] * img.naturalHeight;
    const dx0 = posX[i0] * SCALE, dy0 = posY[i0] * SCALE;
    const dx1 = posX[i1] * SCALE, dy1 = posY[i1] * SCALE;
    const dx2 = posX[i2] * SCALE, dy2 = posY[i2] * SCALE;
    const denom = (sx1 - sx0) * (sy2 - sy0) - (sy1 - sy0) * (sx2 - sx0);
    if (Math.abs(denom) < 0.0001) return;
    const a = ((dx1 - dx0) * (sy2 - sy0) - (dx2 - dx0) * (sy1 - sy0)) / denom;
    const c = ((dx2 - dx0) * (sx1 - sx0) - (dx1 - dx0) * (sx2 - sx0)) / denom;
    const e = dx0 - a * sx0 - c * sy0;
    const b = ((dy1 - dy0) * (sy2 - sy0) - (dy2 - dy0) * (sy1 - sy0)) / denom;
    const d = ((dy2 - dy0) * (sx1 - sx0) - (dy1 - dy0) * (sx2 - sx0)) / denom;
    const f = dy0 - b * sx0 - d * sy0;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(dx0, dy0);
    ctx.lineTo(dx1, dy1);
    ctx.lineTo(dx2, dy2);
    ctx.closePath();
    ctx.clip();
    ctx.transform(a, b, c, d, e, f);
    ctx.drawImage(img, 0, 0);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    if (!imgReady) return;
    for (let t = 0; t < triangles.length; t++) {
      const tri = triangles[t];
      drawTriangle(tri[0], tri[1], tri[2]);
    }
  }

  function step() {
    for (let i = 0; i < NV; i++) {
      const targetX = restX[i] + permX[i];
      const targetY = restY[i] + permY[i];
      velX[i] += (targetX - posX[i]) * SPRING_K;
      velY[i] += (targetY - posY[i]) * SPRING_K;
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        let sumX = 0, sumY = 0, cnt = 0;
        if (c > 0) { const n = i - 1; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (c < COLS - 1) { const n = i + 1; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (r > 0) { const n = i - COLS; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (r < ROWS - 1) { const n = i + COLS; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (cnt > 0) { velX[i] += (sumX / cnt) * NEIGHBOR_K; velY[i] += (sumY / cnt) * NEIGHBOR_K; }
      }
    }
    let maxDelta = 0;
    for (let i = 0; i < NV; i++) {
      velX[i] *= DAMPING;
      velY[i] *= DAMPING;
      if (velX[i] > MAX_VEL) velX[i] = MAX_VEL; else if (velX[i] < -MAX_VEL) velX[i] = -MAX_VEL;
      if (velY[i] > MAX_VEL) velY[i] = MAX_VEL; else if (velY[i] < -MAX_VEL) velY[i] = -MAX_VEL;
      posX[i] += velX[i];
      posY[i] += velY[i];
      const d = Math.abs(velX[i]) + Math.abs(velY[i]);
      if (d > maxDelta) maxDelta = d;
    }
    for (let i = 0; i < NV; i++) {
      permX[i] *= PERM_DECAY;
      permY[i] *= PERM_DECAY;
    }
    return maxDelta;
  }

  let rafId = null;
  function loop() {
    rafId = null;
    const delta = step();
    render();
    if (delta > 0.05) rafId = requestAnimationFrame(loop);
  }
  function kickLoop() {
    if (rafId === null) rafId = requestAnimationFrame(loop);
  }

  function applyImpact(px, py, intensity) {
    const radius = 55 + intensity * 40;
    const r2 = radius * radius;
    const strength = 22 + intensity * 30;
    const seed = Math.random() * 1000;
    for (let i = 0; i < NV; i++) {
      const dx = posX[i] - px;
      const dy = posY[i] - py;
      const dist2 = dx*dx + dy*dy;
      if (dist2 > r2) continue;
      const dist = Math.sqrt(dist2);
      const falloff = 1 - dist / radius;
      const fall = falloff * falloff;
      const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 3.0;
      const n = Math.sin(posX[i] * 0.15 + seed) * Math.cos(posY[i] * 0.15 + seed * 0.7);
      const n2 = Math.sin((posX[i] + posY[i]) * 0.08 + seed);
      const dirX = Math.cos(ang) + n * 0.7;
      const dirY = Math.sin(ang) + n2 * 0.7;
      velX[i] += dirX * strength * fall * 0.4;
      velY[i] += dirY * strength * fall * 0.4;
      permX[i] += dirX * strength * fall * 0.35;
      permY[i] += dirY * strength * fall * 0.35;
      const curMag = Math.sqrt(permX[i]*permX[i] + permY[i]*permY[i]);
      const maxPerm = isCrumpled ? 300 : 25;
      if (curMag > maxPerm) {
        permX[i] *= maxPerm / curMag;
        permY[i] *= maxPerm / curMag;
      }
    }
    kickLoop();
  }

  // === AUDIO: per-bag sonic character ===
  let audioCtx = null, masterGain = null, rubSource = null, rubGain = null, rubFilter = null, rubPreFilter = null;

  // Build three noise types: pink (-3dB/oct), white (flat), brown (-6dB/oct)
  function fillPinkNoise(data) {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < data.length; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.15;
      b6 = w * 0.115926;
    }
  }
  function fillWhiteNoise(data) {
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * 0.5;
  }
  function fillBrownNoise(data) {
    let last = 0;
    for (let i = 0; i < data.length; i++) {
      const w = (Math.random()*2-1) * 0.15;
      last = (last + w) * 0.98;
      data[i] = last * 3.5;
    }
  }
  function fillNoise(data, type) {
    if (type === 'white') fillWhiteNoise(data);
    else if (type === 'brown') fillBrownNoise(data);
    else fillPinkNoise(data);
  }

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
      // sustained rub noise — pre-generated pink, filtered dynamically per bag
      const bufSize = audioCtx.sampleRate * 2;
      const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      fillPinkNoise(noiseBuf.getChannelData(0));
      rubSource = audioCtx.createBufferSource();
      rubSource.buffer = noiseBuf;
      rubSource.loop = true;
      rubFilter = audioCtx.createBiquadFilter();
      rubFilter.type = 'bandpass';
      rubFilter.frequency.value = 3200;
      rubFilter.Q.value = 0.8;
      rubGain = audioCtx.createGain();
      rubGain.gain.value = 0;
      rubSource.connect(rubFilter);
      rubFilter.connect(rubGain);
      rubGain.connect(masterGain);
      rubSource.start();
    } catch (e) {}
  }

  function playRustleBurst(intensity) {
    if (!audioCtx) return;
    const audioProfile = BAGS[currentBagIdx].audio;
    const now = audioCtx.currentTime;
    // Slight random variation per burst so same bag still sounds varied
    const freqJitter = 0.85 + Math.random() * 0.3;
    const duration = (0.2 + Math.random() * 0.4 + intensity * 0.3) * audioProfile.durMul;
    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    fillNoise(data, audioProfile.noise);
    const attackSamples = Math.floor(bufferSize * 0.08);
    const crackleProb = audioProfile.crackle * (0.6 + intensity * 0.8);
    for (let i = 0; i < bufferSize; i++) {
      let env;
      if (i < attackSamples) env = i / attackSamples;
      else {
        const t = (i - attackSamples) / (bufferSize - attackSamples);
        env = Math.pow(1 - t, 1.4);
      }
      const click = Math.random() < crackleProb ? (Math.random() - 0.5) * 0.6 : 0;
      data[i] = (data[i] + click) * env * (0.55 + intensity * 0.45);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = audioProfile.freq * freqJitter;
    bp.Q.value = audioProfile.q + Math.random() * 0.4;
    const shelf = audioCtx.createBiquadFilter();
    shelf.type = 'highshelf';
    shelf.frequency.value = 5000;
    shelf.gain.value = audioProfile.shelf;
    const g = audioCtx.createGain();
    g.gain.value = 0.6 + intensity * 0.4;
    src.connect(bp); bp.connect(shelf); shelf.connect(g); g.connect(masterGain);
    src.start(now);
    src.stop(now + duration);
  }
  function playSwipeSound() {
    if (!audioCtx) return;
    playRustleBurst(0.4);
  }
  function updateRubRustle(speed) {
    if (!rubGain || !rubFilter) return;
    const audioProfile = BAGS[currentBagIdx].audio;
    const targetGain = Math.min(0.55, speed * 0.3);
    const now = audioCtx.currentTime;
    rubGain.gain.cancelScheduledValues(now);
    rubGain.gain.linearRampToValueAtTime(targetGain, now + 0.05);
    rubFilter.frequency.cancelScheduledValues(now);
    rubFilter.frequency.linearRampToValueAtTime(audioProfile.freq * 0.75 + speed * 800, now + 0.08);
    rubFilter.Q.value = audioProfile.q;
  }
  function stopRubRustle() {
    if (!rubGain) return;
    const now = audioCtx.currentTime;
    rubGain.gain.cancelScheduledValues(now);
    rubGain.gain.linearRampToValueAtTime(0, now + 0.15);
  }
  function vibrate(intensity) {
    if (!navigator.vibrate) return;
    try { navigator.vibrate(Math.round(8 + intensity * 35)); } catch (e) {}
  }

  function updateCounter() {
    counter.textContent = count;
  }

  function doRustle(px, py, intensity) {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    count++;
    updateCounter();
    if (count >= CRUMPLE_THRESHOLD && !isCrumpled) {
      triggerFullCrumple();
      return;
    }
    applyImpact(px, py, intensity);
    playRustleBurst(intensity);
    vibrate(intensity);
  }

  function triggerFullCrumple() {
    isCrumpled = true;
    const cx = BAG_LEFT + BAG_W / 2;
    const cy = BAG_TOP + BAG_H / 2;
    const SHRINK = 0.28;
    for (let i = 0; i < NV; i++) {
      const dxr = restX[i] - cx;
      const dyr = restY[i] - cy;
      const chaosAng = Math.random() * Math.PI * 2;
      const chaosMag = 8 + Math.random() * 18;
      const chaosX = Math.cos(chaosAng) * chaosMag;
      const chaosY = Math.sin(chaosAng) * chaosMag;
      permX[i] = -dxr * (1 - SHRINK) + chaosX;
      permY[i] = -dyr * (1 - SHRINK) + chaosY;
      velX[i] += -dxr * 0.12 + (Math.random() - 0.5) * 20;
      velY[i] += -dyr * 0.12 + (Math.random() - 0.5) * 20;
    }
    kickLoop();
    for (let i = 0; i < 8; i++) {
      setTimeout(() => playRustleBurst(0.8 + Math.random() * 0.2), i * 90);
    }
    if (navigator.vibrate) {
      try { navigator.vibrate([80, 30, 100, 30, 80, 30, 60, 30, 160]); } catch (e) {}
    }
  }

  function eventToLocal(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (DISP_W / rect.width);
    const y = (e.clientY - rect.top) * (DISP_H / rect.height);
    return { x, y };
  }

  let swipeStart = null;
  const SWIPE_MIN_DIST = 80;
  const SWIPE_MAX_OFFAXIS = 60;
  const TAP_MAX_DIST = 10;
  const TAP_MAX_TIME = 300;

  let lastPointer = { x: 0, y: 0, t: 0 };
  stage.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.classList.contains('dot')) return;
    e.preventDefault();
    const p = eventToLocal(e);
    swipeStart = { x: e.clientX, y: e.clientY, t: performance.now(), resolved: false };
    lastPointer = { x: p.x, y: p.y, t: performance.now() };
  });

  stage.addEventListener('pointerup', (e) => {
    stopRubRustle();
    if (!swipeStart || swipeStart.resolved) { swipeStart = null; return; }
    const dx = e.clientX - swipeStart.x;
    const dy = e.clientY - swipeStart.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const dt = performance.now() - swipeStart.t;

    if (Math.abs(dx) >= SWIPE_MIN_DIST && Math.abs(dy) <= SWIPE_MAX_OFFAXIS) {
      if (dx < 0) {
        const nextIdx = (currentBagIdx + 1) % BAGS.length;
        switchBag(nextIdx, 'right');
      } else {
        const prevIdx = (currentBagIdx - 1 + BAGS.length) % BAGS.length;
        switchBag(prevIdx, 'left');
      }
    } else if (dist <= TAP_MAX_DIST && dt <= TAP_MAX_TIME) {
      const p = eventToLocal(e);
      const pressure = e.pressure > 0 ? e.pressure : 0.5;
      const intensity = Math.min(1, 0.55 + pressure * 0.45 + Math.random() * 0.1);
      doRustle(p.x, p.y, intensity);
    }
    swipeStart = null;
  });

  stage.addEventListener('pointercancel', () => { stopRubRustle(); swipeStart = null; });
  stage.addEventListener('pointerleave', () => { stopRubRustle(); });

  let rubCooldown = 0;
  stage.addEventListener('pointermove', (e) => {
    if (!(e.buttons > 0 || e.pressure > 0)) { stopRubRustle(); return; }
    const now = performance.now();
    const dt = now - lastPointer.t;
    if (dt < 14) return;
    const p = eventToLocal(e);
    const dx = p.x - lastPointer.x;
    const dy = p.y - lastPointer.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const speed = dist / dt;
    lastPointer = { x: p.x, y: p.y, t: now };

    if (swipeStart && !swipeStart.resolved) {
      const totalDx = e.clientX - swipeStart.x;
      const totalDy = e.clientY - swipeStart.y;
      const totalDist = Math.sqrt(totalDx*totalDx + totalDy*totalDy);
      if (totalDist > TAP_MAX_DIST) {
        const isHorizontalSwipe = Math.abs(totalDx) > Math.abs(totalDy) * 1.5 && Math.abs(totalDy) < SWIPE_MAX_OFFAXIS;
        if (!isHorizontalSwipe) {
          swipeStart.resolved = true;
          const startLocal = eventToLocal({ clientX: swipeStart.x, clientY: swipeStart.y });
          doRustle(startLocal.x, startLocal.y, 0.5);
        } else {
          return;
        }
      } else {
        return;
      }
    }

    if (speed > 0.1) { initAudio(); updateRubRustle(speed); } else { stopRubRustle(); }
    if (speed > 0.25 && now > rubCooldown) {
      const intensity = Math.min(1, 0.3 + speed * 0.5);
      doRustle(p.x, p.y, intensity);
      rubCooldown = now + 40 + Math.random() * 40;
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
      const prevIdx = (currentBagIdx - 1 + BAGS.length) % BAGS.length;
      switchBag(prevIdx, 'left');
    } else if (e.key === 'ArrowRight') {
      const nextIdx = (currentBagIdx + 1) % BAGS.length;
      switchBag(nextIdx, 'right');
    }
  });

  let shakeBuf = [];
  let shakeCooldown = 0;
  function onMotion(e) {
    const acc = e.accelerationIncludingGravity || e.acceleration;
    if (!acc) return;
    const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
    shakeBuf.push(mag);
    if (shakeBuf.length > 8) shakeBuf.shift();
    const avg = shakeBuf.reduce((a,b)=>a+b,0) / shakeBuf.length;
    const variance = shakeBuf.reduce((a,b)=>a+(b-avg)**2, 0) / shakeBuf.length;
    const now = performance.now();
    if (variance > 6 && now > shakeCooldown) {
      const intensity = Math.min(1, variance / 22);
      const n = 3 + Math.floor(intensity * 4);
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          const px = BAG_LEFT + Math.random() * BAG_W;
          const py = BAG_TOP + Math.random() * BAG_H;
          doRustle(px, py, intensity * (0.7 + Math.random() * 0.3));
        }, i * 40);
      }
      shakeCooldown = now + 220;
    }
  }
  let gyroActive = false;
  async function enableGyro() {
    try {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm !== 'granted') throw new Error('denied');
      }
      window.addEventListener('devicemotion', onMotion);
      gyroActive = true;
      gyroBtn.textContent = 'active';
      gyroBtn.style.color = '#e8e6e0';
      gyroBtn.style.borderColor = 'rgba(232,230,224,0.5)';
    } catch (err) {
      gyroBtn.textContent = 'no access';
      setTimeout(() => { gyroBtn.textContent = 'gyro'; }, 1500);
    }
  }
  gyroBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (gyroActive) {
      window.removeEventListener('devicemotion', onMotion);
      gyroActive = false;
      gyroBtn.textContent = 'gyro';
      gyroBtn.style.color = '';
      gyroBtn.style.borderColor = '';
    } else {
      enableGyro();
    }
  });

  document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', (e) => { e.preventDefault(); });

  renderDots();
  if (imgReady) render();
})();
</script>
</body>
</html>
