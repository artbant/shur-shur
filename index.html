<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rustle — tactile noise</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #050508;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    color: #e8e6e0;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #app {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #1a1a22 0%, #050508 85%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .header {
    position: absolute;
    top: env(safe-area-inset-top, 16px);
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 5;
    padding-top: 16px;
  }
  .header-text {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(232,230,224,0.45);
    text-transform: uppercase;
  }
  .panel-left {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 44px);
    left: calc(env(safe-area-inset-left, 0px) + 16px);
    z-index: 4;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .panel-right {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 44px);
    right: calc(env(safe-area-inset-right, 0px) + 16px);
    z-index: 4;
    width: 90px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .panel-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(232,230,224,0.4);
    text-transform: uppercase;
  }
  #counter {
    font-size: 30px;
    font-weight: 300;
    color: #e8e6e0;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .progress-bar {
    width: 80px;
    height: 2px;
    background: rgba(232,230,224,0.1);
    border-radius: 1px;
    overflow: hidden;
  }
  #progress-fill {
    width: 0%;
    height: 100%;
    background: #e8e6e0;
    transition: width 0.2s;
  }
  #progress-label {
    font-size: 9px;
    color: rgba(232,230,224,0.35);
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }
  button {
    background: transparent;
    border: 0.5px solid rgba(232,230,224,0.2);
    color: rgba(232,230,224,0.5);
    font-size: 10px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    transition: all 0.15s;
  }
  button:active { transform: scale(0.96); }
  button:hover { color: rgba(232,230,224,0.8); border-color: rgba(232,230,224,0.4); }
  #reset-btn { margin-top: 2px; display: none; }
  #gyro-btn { margin-top: 8px; }
  input[type="range"] {
    width: 90px;
    accent-color: #e8e6e0;
    background: transparent;
  }
  #vol-readout {
    font-size: 10px;
    color: rgba(232,230,224,0.4);
    font-variant-numeric: tabular-nums;
  }
  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: none;
  }
  #bag-canvas {
    filter: drop-shadow(0 30px 40px rgba(0,0,0,0.55));
    max-width: 90vw;
    max-height: 80vh;
    width: 340px;
    height: 480px;
  }
  #bag-source { display: none; }
  .footer {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 5;
  }
  #hint {
    font-size: 11px;
    color: rgba(232,230,224,0.4);
    letter-spacing: 0.18em;
    text-align: center;
    padding: 0 16px;
  }
  @media (max-width: 400px) {
    #bag-canvas { width: 88vw; height: auto; aspect-ratio: 340/480; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-text">rustle</div>
  </div>

  <div class="panel-left">
    <div class="panel-label">touches</div>
    <div id="counter">0</div>
    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-label">0 / 150</div>
    <button id="reset-btn">smooth</button>
  </div>

  <div class="panel-right">
    <div class="panel-label">volume</div>
    <input type="range" id="volume" min="0" max="100" value="70">
    <div id="vol-readout">70</div>
    <button id="gyro-btn">gyro</button>
  </div>

<script>
(function() {
  const canvas = document.getElementById('bag-canvas');
  const ctx = canvas.getContext('2d');
  const img = document.getElementById('bag-source');
  const stage = document.getElementById('stage');
  const volSlider = document.getElementById('volume');
  const volReadout = document.getElementById('vol-readout');
  const counter = document.getElementById('counter');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');
  const resetBtn = document.getElementById('reset-btn');
  const gyroBtn = document.getElementById('gyro-btn');
  const hint = document.getElementById('hint');

  const SCALE = 2;
  const DISP_W = 340, DISP_H = 480;
  const CANVAS_W = DISP_W * SCALE, CANVAS_H = DISP_H * SCALE;

  const COLS = 16;
  const ROWS = 22;
  const NV = COLS * ROWS;

  const BAG_LEFT = 15, BAG_TOP = 15, BAG_RIGHT = 325, BAG_BOTTOM = 465;
  const BAG_W = BAG_RIGHT - BAG_LEFT, BAG_H = BAG_BOTTOM - BAG_TOP;

  const restX = new Float32Array(NV);
  const restY = new Float32Array(NV);
  const posX = new Float32Array(NV);
  const posY = new Float32Array(NV);
  const velX = new Float32Array(NV);
  const velY = new Float32Array(NV);
  const uvU = new Float32Array(NV);
  const uvV = new Float32Array(NV);
  const permX = new Float32Array(NV);
  const permY = new Float32Array(NV);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      const u = c / (COLS - 1);
      const v = r / (ROWS - 1);
      const x = BAG_LEFT + u * BAG_W;
      const y = BAG_TOP + v * BAG_H;
      restX[i] = x; restY[i] = y;
      posX[i] = x; posY[i] = y;
      uvU[i] = u; uvV[i] = v;
    }
  }

  const triangles = [];
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const tl = r * COLS + c;
      const tr = r * COLS + (c + 1);
      const bl = (r + 1) * COLS + c;
      const br = (r + 1) * COLS + (c + 1);
      triangles.push([tl, tr, br]);
      triangles.push([tl, br, bl]);
    }
  }

  let count = 0;
  const CRUMPLE_THRESHOLD = 150;
  let isCrumpled = false;
  let imgReady = false;
  img.onload = () => { imgReady = true; render(); };
  if (img.complete && img.naturalWidth > 0) { imgReady = true; }

  const SPRING_K = 0.15;
  const NEIGHBOR_K = 0.08;
  const DAMPING = 0.82;
  const PERM_DECAY = 0.998;
  const MAX_VEL = 40;

  function drawTriangle(i0, i1, i2) {
    const sx0 = uvU[i0] * img.naturalWidth, sy0 = uvV[i0] * img.naturalHeight;
    const sx1 = uvU[i1] * img.naturalWidth, sy1 = uvV[i1] * img.naturalHeight;
    const sx2 = uvU[i2] * img.naturalWidth, sy2 = uvV[i2] * img.naturalHeight;
    const dx0 = posX[i0] * SCALE, dy0 = posY[i0] * SCALE;
    const dx1 = posX[i1] * SCALE, dy1 = posY[i1] * SCALE;
    const dx2 = posX[i2] * SCALE, dy2 = posY[i2] * SCALE;
    const denom = (sx1 - sx0) * (sy2 - sy0) - (sy1 - sy0) * (sx2 - sx0);
    if (Math.abs(denom) < 0.0001) return;
    const a = ((dx1 - dx0) * (sy2 - sy0) - (dx2 - dx0) * (sy1 - sy0)) / denom;
    const c = ((dx2 - dx0) * (sx1 - sx0) - (dx1 - dx0) * (sx2 - sx0)) / denom;
    const e = dx0 - a * sx0 - c * sy0;
    const b = ((dy1 - dy0) * (sy2 - sy0) - (dy2 - dy0) * (sy1 - sy0)) / denom;
    const d = ((dy2 - dy0) * (sx1 - sx0) - (dy1 - dy0) * (sx2 - sx0)) / denom;
    const f = dy0 - b * sx0 - d * sy0;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(dx0, dy0);
    ctx.lineTo(dx1, dy1);
    ctx.lineTo(dx2, dy2);
    ctx.closePath();
    ctx.clip();
    ctx.transform(a, b, c, d, e, f);
    ctx.drawImage(img, 0, 0);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    if (!imgReady) return;
    for (let t = 0; t < triangles.length; t++) {
      const tri = triangles[t];
      drawTriangle(tri[0], tri[1], tri[2]);
    }
  }

  function step() {
    for (let i = 0; i < NV; i++) {
      const targetX = restX[i] + permX[i];
      const targetY = restY[i] + permY[i];
      velX[i] += (targetX - posX[i]) * SPRING_K;
      velY[i] += (targetY - posY[i]) * SPRING_K;
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        let sumX = 0, sumY = 0, cnt = 0;
        if (c > 0) { const n = i - 1; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (c < COLS - 1) { const n = i + 1; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (r > 0) { const n = i - COLS; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (r < ROWS - 1) { const n = i + COLS; sumX += posX[n] - posX[i] + (restX[i] - restX[n]); sumY += posY[n] - posY[i] + (restY[i] - restY[n]); cnt++; }
        if (cnt > 0) { velX[i] += (sumX / cnt) * NEIGHBOR_K; velY[i] += (sumY / cnt) * NEIGHBOR_K; }
      }
    }
    let maxDelta = 0;
    for (let i = 0; i < NV; i++) {
      velX[i] *= DAMPING;
      velY[i] *= DAMPING;
      if (velX[i] > MAX_VEL) velX[i] = MAX_VEL; else if (velX[i] < -MAX_VEL) velX[i] = -MAX_VEL;
      if (velY[i] > MAX_VEL) velY[i] = MAX_VEL; else if (velY[i] < -MAX_VEL) velY[i] = -MAX_VEL;
      posX[i] += velX[i];
      posY[i] += velY[i];
      const d = Math.abs(velX[i]) + Math.abs(velY[i]);
      if (d > maxDelta) maxDelta = d;
    }
    for (let i = 0; i < NV; i++) {
      permX[i] *= PERM_DECAY;
      permY[i] *= PERM_DECAY;
    }
    return maxDelta;
  }

  let rafId = null;
  function loop() {
    rafId = null;
    const delta = step();
    render();
    if (delta > 0.05) rafId = requestAnimationFrame(loop);
  }
  function kickLoop() {
    if (rafId === null) rafId = requestAnimationFrame(loop);
  }

  function applyImpact(px, py, intensity) {
    const radius = 55 + intensity * 40;
    const r2 = radius * radius;
    const strength = 22 + intensity * 30;
    const seed = Math.random() * 1000;
    for (let i = 0; i < NV; i++) {
      const dx = posX[i] - px;
      const dy = posY[i] - py;
      const dist2 = dx*dx + dy*dy;
      if (dist2 > r2) continue;
      const dist = Math.sqrt(dist2);
      const falloff = 1 - dist / radius;
      const fall = falloff * falloff;
      const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 3.0;
      const n = Math.sin(posX[i] * 0.15 + seed) * Math.cos(posY[i] * 0.15 + seed * 0.7);
      const n2 = Math.sin((posX[i] + posY[i]) * 0.08 + seed);
      const dirX = Math.cos(ang) + n * 0.7;
      const dirY = Math.sin(ang) + n2 * 0.7;
      velX[i] += dirX * strength * fall * 0.4;
      velY[i] += dirY * strength * fall * 0.4;
      permX[i] += dirX * strength * fall * 0.35;
      permY[i] += dirY * strength * fall * 0.35;
      const curMag = Math.sqrt(permX[i]*permX[i] + permY[i]*permY[i]);
      const maxPerm = isCrumpled ? 300 : 25;
      if (curMag > maxPerm) {
        permX[i] *= maxPerm / curMag;
        permY[i] *= maxPerm / curMag;
      }
    }
    kickLoop();
  }

  let audioCtx = null, masterGain = null, rubSource = null, rubGain = null, rubFilter = null;
  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = parseFloat(volSlider.value) / 100 * 0.45;
      masterGain.connect(audioCtx.destination);
      const bufSize = audioCtx.sampleRate * 2;
      const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufSize; i++) {
        const white = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        b3 = 0.86650 * b3 + white * 0.3104856;
        b4 = 0.55000 * b4 + white * 0.5329522;
        b5 = -0.7616 * b5 - white * 0.0168980;
        d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.15;
        b6 = white * 0.115926;
      }
      rubSource = audioCtx.createBufferSource();
      rubSource.buffer = noiseBuf;
      rubSource.loop = true;
      rubFilter = audioCtx.createBiquadFilter();
      rubFilter.type = 'bandpass';
      rubFilter.frequency.value = 3200;
      rubFilter.Q.value = 0.8;
      rubGain = audioCtx.createGain();
      rubGain.gain.value = 0;
      rubSource.connect(rubFilter);
      rubFilter.connect(rubGain);
      rubGain.connect(masterGain);
      rubSource.start();
    } catch (e) {}
  }
  function playRustleBurst(intensity) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const duration = 0.2 + Math.random() * 0.4 + intensity * 0.3;
    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    const attackSamples = Math.floor(bufferSize * 0.08);
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      let sample = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.12;
      b6 = white * 0.115926;
      let env;
      if (i < attackSamples) env = i / attackSamples;
      else {
        const t = (i - attackSamples) / (bufferSize - attackSamples);
        env = Math.pow(1 - t, 1.4);
      }
      const click = Math.random() < 0.006 ? (Math.random() - 0.5) * 0.6 : 0;
      data[i] = (sample + click) * env * (0.55 + intensity * 0.45);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2800 + Math.random() * 2200;
    bp.Q.value = 0.7 + Math.random() * 0.5;
    const shelf = audioCtx.createBiquadFilter();
    shelf.type = 'highshelf';
    shelf.frequency.value = 5000;
    shelf.gain.value = 3;
    const g = audioCtx.createGain();
    g.gain.value = 0.6 + intensity * 0.4;
    src.connect(bp); bp.connect(shelf); shelf.connect(g); g.connect(masterGain);
    src.start(now);
    src.stop(now + duration);
  }
  function updateRubRustle(speed) {
    if (!rubGain || !rubFilter) return;
    const targetGain = Math.min(0.55, speed * 0.3);
    const now = audioCtx.currentTime;
    rubGain.gain.cancelScheduledValues(now);
    rubGain.gain.linearRampToValueAtTime(targetGain, now + 0.05);
    rubFilter.frequency.cancelScheduledValues(now);
    rubFilter.frequency.linearRampToValueAtTime(2500 + speed * 800, now + 0.08);
  }
  function stopRubRustle() {
    if (!rubGain) return;
    const now = audioCtx.currentTime;
    rubGain.gain.cancelScheduledValues(now);
    rubGain.gain.linearRampToValueAtTime(0, now + 0.15);
  }
  function vibrate(intensity) {
    if (!navigator.vibrate) return;
    try { navigator.vibrate(Math.round(8 + intensity * 35)); } catch (e) {}
  }

  function updateCounter() {
    counter.textContent = count;
    const progress = Math.min(1, count / CRUMPLE_THRESHOLD);
    progressFill.style.width = (progress * 100) + '%';
    progressLabel.textContent = count + ' / ' + CRUMPLE_THRESHOLD;
    if (count >= 5 && resetBtn.style.display === 'none') resetBtn.style.display = 'block';
  }

  function doRustle(px, py, intensity) {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    count++;
    updateCounter();
    if (count >= CRUMPLE_THRESHOLD && !isCrumpled) {
      triggerFullCrumple();
      return;
    }
    applyImpact(px, py, intensity);
    playRustleBurst(intensity);
    vibrate(intensity);
  }

  function triggerFullCrumple() {
    isCrumpled = true;
    const cx = BAG_LEFT + BAG_W / 2;
    const cy = BAG_TOP + BAG_H / 2;
    // Collapse: every vertex gets pulled to center, with chaotic offset
    // Shrink factor: 0.28 means bag becomes ~28% of its size (small crumpled ball)
    const SHRINK = 0.28;
    for (let i = 0; i < NV; i++) {
      // Direction from center to rest position
      const dxr = restX[i] - cx;
      const dyr = restY[i] - cy;
      // New target: scaled down toward center + chaotic crumple offset
      const chaosAng = Math.random() * Math.PI * 2;
      const chaosMag = 8 + Math.random() * 18;
      const chaosX = Math.cos(chaosAng) * chaosMag;
      const chaosY = Math.sin(chaosAng) * chaosMag;
      // permX/permY are OFFSETS from rest position, so:
      // new position = rest + perm = (cx + dxr*SHRINK + chaos)
      // so perm = (cx + dxr*SHRINK + chaos) - rest = -dxr*(1-SHRINK) + chaos
      permX[i] = -dxr * (1 - SHRINK) + chaosX;
      permY[i] = -dyr * (1 - SHRINK) + chaosY;
      // Add violent velocity kick toward center
      velX[i] += -dxr * 0.12 + (Math.random() - 0.5) * 20;
      velY[i] += -dyr * 0.12 + (Math.random() - 0.5) * 20;
    }
    // Raise the permanent-offset clamp so the collapse survives future taps
    // (handled by new MAX_PERM_CRUMPLED in applyImpact via global flag)
    kickLoop();
    for (let i = 0; i < 8; i++) {
      setTimeout(() => playRustleBurst(0.8 + Math.random() * 0.2), i * 90);
    }
    if (navigator.vibrate) {
      try { navigator.vibrate([80, 30, 100, 30, 80, 30, 60, 30, 160]); } catch (e) {}
    }
    hint.textContent = 'bant';
  }

  function resetBag() {
    count = 0;
    isCrumpled = false;
    updateCounter();
    progressFill.style.width = '0%';
    for (let i = 0; i < NV; i++) {
      posX[i] = restX[i];
      posY[i] = restY[i];
      velX[i] = 0; velY[i] = 0;
      permX[i] = 0; permY[i] = 0;
    }
    render();
    resetBtn.style.display = 'none';
    hint.textContent = 'bant';
  }

  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    playRustleBurst(0.25);
    resetBag();
  });

  function eventToLocal(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (DISP_W / rect.width);
    const y = (e.clientY - rect.top) * (DISP_H / rect.height);
    return { x, y };
  }

  let lastPointer = { x: 0, y: 0, t: 0 };
  stage.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    e.preventDefault();
    const p = eventToLocal(e);
    lastPointer = { x: p.x, y: p.y, t: performance.now() };
    const pressure = e.pressure > 0 ? e.pressure : 0.5;
    const intensity = Math.min(1, 0.55 + pressure * 0.45 + Math.random() * 0.1);
    doRustle(p.x, p.y, intensity);
  });

  stage.addEventListener('pointerup', () => { stopRubRustle(); });
  stage.addEventListener('pointercancel', () => { stopRubRustle(); });
  stage.addEventListener('pointerleave', () => { stopRubRustle(); });

  let rubCooldown = 0;
  stage.addEventListener('pointermove', (e) => {
    if (!(e.buttons > 0 || e.pressure > 0)) { stopRubRustle(); return; }
    const now = performance.now();
    const dt = now - lastPointer.t;
    if (dt < 14) return;
    const p = eventToLocal(e);
    const dx = p.x - lastPointer.x;
    const dy = p.y - lastPointer.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const speed = dist / dt;
    lastPointer = { x: p.x, y: p.y, t: now };
    if (speed > 0.1) { initAudio(); updateRubRustle(speed); } else { stopRubRustle(); }
    if (speed > 0.25 && now > rubCooldown) {
      const intensity = Math.min(1, 0.3 + speed * 0.5);
      doRustle(p.x, p.y, intensity);
      rubCooldown = now + 40 + Math.random() * 40;
    }
  });

  volSlider.addEventListener('input', () => {
    const v = parseFloat(volSlider.value);
    volReadout.textContent = Math.round(v);
    if (masterGain) masterGain.gain.value = v / 100 * 0.45;
  });

  let shakeBuf = [];
  let shakeCooldown = 0;
  function onMotion(e) {
    const acc = e.accelerationIncludingGravity || e.acceleration;
    if (!acc) return;
    const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
    shakeBuf.push(mag);
    if (shakeBuf.length > 8) shakeBuf.shift();
    const avg = shakeBuf.reduce((a,b)=>a+b,0) / shakeBuf.length;
    const variance = shakeBuf.reduce((a,b)=>a+(b-avg)**2, 0) / shakeBuf.length;
    const now = performance.now();
    if (variance > 6 && now > shakeCooldown) {
      const intensity = Math.min(1, variance / 22);
      const n = 3 + Math.floor(intensity * 4);
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          const px = BAG_LEFT + Math.random() * BAG_W;
          const py = BAG_TOP + Math.random() * BAG_H;
          doRustle(px, py, intensity * (0.7 + Math.random() * 0.3));
        }, i * 40);
      }
      shakeCooldown = now + 220;
    }
  }
  let gyroActive = false;
  async function enableGyro() {
    try {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm !== 'granted') throw new Error('denied');
      }
      window.addEventListener('devicemotion', onMotion);
      gyroActive = true;
      gyroBtn.textContent = 'active';
      gyroBtn.style.color = '#e8e6e0';
      gyroBtn.style.borderColor = 'rgba(232,230,224,0.5)';
    } catch (err) {
      gyroBtn.textContent = 'no access';
      setTimeout(() => { gyroBtn.textContent = 'gyro'; }, 1500);
    }
  }
  gyroBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (gyroActive) {
      window.removeEventListener('devicemotion', onMotion);
      gyroActive = false;
      gyroBtn.textContent = 'gyro';
      gyroBtn.style.color = '';
      gyroBtn.style.borderColor = '';
    } else {
      enableGyro();
    }
  });

  // Prevent scroll/zoom on iOS
  document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', (e) => { e.preventDefault(); });

  if (imgReady) render();
})();
</script>
</body>
</html>
